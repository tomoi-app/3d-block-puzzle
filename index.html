<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>3Dブロックパズル(仮)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container"></div>

    <!-- ダメージフラッシュ -->
    <div id="damage-flash"></div>

    <div id="score-display">高度: 0m</div>

    <!-- HP表示（右上） -->
    <div id="hp-display"></div>

    <div id="ui-layer">
      <div class="control-pad">

        <!-- 十字キー（移動） -->
        <div id="dpad">
          <button id="btn-fwd"    class="dpad-btn">▲</button>
          <button id="btn-turn-l" class="dpad-btn">◄</button>
          <div class="dpad-center"></div>
          <button id="btn-turn-r" class="dpad-btn">►</button>
          <button id="btn-bwd"    class="dpad-btn">▼</button>
        </div>

        <!-- 回転ボタン -->
        <div class="rot-group">
          <button id="btn-rot-x" class="rot-btn">X回</button>
          <button id="btn-rot-y" class="rot-btn">Y回</button>
          <button id="btn-rot-z" class="rot-btn">Z回</button>
        </div>

      </div>
    </div>

    <div id="game-over-screen" style="display: none">
      <h1>GAME OVER</h1>
      <p id="final-score">落下しました...</p>
      <button id="retry-btn">リトライ</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
